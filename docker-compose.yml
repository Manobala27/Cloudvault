version: '3.8'

services:
  cloudvault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudvault_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - cloudvault_data:/app/instance
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: cloudvault_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cloudvault
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cloudvault_data:
    name: cloudvault_data_volume
