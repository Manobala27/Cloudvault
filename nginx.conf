server {
    listen 80;
    server_name localhost;

    # Basic Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Proxy configuration
    location / {
        proxy_pass http://cloudvault:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout handling
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static file caching
    location /static/ {
        proxy_pass http://cloudvault:5000/static/;
        proxy_set_header Host $host;
        
        # Cache control
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    
    # PWA specific files
    location ~* \.(json|js|html)$ {
        proxy_pass http://cloudvault:5000;
        proxy_set_header Host $host;
        
        # Minimal cache for dynamically changing workers/manifests
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Large File Upload handling
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/cloudvault_access.log;
    error_log /var/log/nginx/cloudvault_error.log warn;
}
