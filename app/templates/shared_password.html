{% extends "base.html" %}
{% block title %}Password Required{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white text-center py-4 border-0">
                <i class="bi bi-lock-fill text-warning" style="font-size: 3rem;"></i>
                <h4 class="mb-0 mt-2 fw-bold">Protected File</h4>
            </div>
            <div class="card-body p-5">
                <p class="text-center text-muted mb-4">This share link is password protected. Please enter the password to view or download the file.</p>
                
                <form action="{{ url_for('files.shared_file', share_token=share.share_token) }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control shadow-sm" id="share_password" name="share_password" placeholder="Password" required autofocus>
                        <label for="share_password"><i class="bi bi-key-fill me-1"></i> Password</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm">
                        Unlock File
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
