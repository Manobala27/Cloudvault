{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="row justify-content-center py-5 mt-5">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="premium-card-large p-5 cv-hover-lift">
            <i class="bi bi-exclamation-triangle-fill text-warning mb-3 d-inline-block" style="font-size: 5rem; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));"></i>
            <h1 class="display-4 fw-bold text-dark">404</h1>
            <h3 class="fw-bold mb-4">Page Not Found</h3>
            <p class="lead text-muted mb-5">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow-sm">Return to Homepage</a>
        </div>
    </div>
</div>
{% endblock %}
