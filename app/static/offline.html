<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | CloudVault</title>
    <!-- Use basic styles to ensure it loads perfectly without external CSS if cache fails, though SW should cache CSS -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            color: #212529;
            text-align: center;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #212529;
                color: #f8f9fa;
            }
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        .icon {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            fill: #6c757d;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        p {
            color: #6c757d;
            margin-bottom: 2rem;
        }
        @media (prefers-color-scheme: dark) {
            p {
                color: #adb5bd;
            }
        }
        .btn {
            display: inline-block;
            font-weight: 400;
            line-height: 1.5;
            color: #fff;
            text-align: center;
            text-decoration: none;
            vertical-align: middle;
            cursor: pointer;
            user-select: none;
            background-color: #0d6efd;
            border: 1px solid #0d6efd;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            border-radius: 0.25rem;
            transition: background-color 0.15s ease-in-out;
        }
        .btn:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SVG Cloud Slash Icon -->
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
            <path d="M13.405 4.027a5.001 5.001 0 0 0-9.499-1.004.5.5 0 1 0-.912.408l.389.871A3.5 3.5 0 0 0 0 7.5a3.5 3.5 0 0 0 3.5 3.5h.063l10.377 2.37a.5.5 0 0 0 .227-.974L13.882 11.9A3.5 3.5 0 0 0 13.5 4h-.095zM4.654 4.544a4.001 4.001 0 0 1 6.88 1.487l2.122.484a2.5 2.5 0 0 1-1.077 4.79l-7.925-1.81z"/>
            <path d="M1 1.5a.5.5 0 0 1 .5-.5h.037L14.71 13.911a.5.5 0 1 1-.772.637L1.137 2.062A.5.5 0 0 1 1 1.5z"/>
        </svg>
        
        <h1>You are offline.</h1>
        <p>It seems your internet connection was lost. CloudVault requires an active connection for this page.</p>
        
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
